<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#FFFFFF"></rect><text x="72" y="92" fill="#333333" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:42px;font-weight:700;letter-spacing:-0.6px;">The Release Readiness Framework</text><text x="72" y="124" fill="#59595B" text-anchor="start" style="font-family:Inter, sans-serif;font-size:19px;font-weight:400;">Six checks before you commit to a date</text><rect x="72" y="152" width="719" height="110" rx="6" fill="#EAF1F8" stroke="#D9E2EC" stroke-width="1"></rect><rect x="72" y="152" width="7" height="110" rx="0" fill="#1B4C84"></rect><text x="103" y="185" fill="#2E6BB0" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;">01</text><text x="103" y="211" fill="#333333" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:21px;font-weight:700;letter-spacing:-0.2px;">Scope &amp; priorities</text><text x="103" y="237" fill="#59595B" text-anchor="start" style="font-family:Inter, sans-serif;font-size:15px;font-weight:400;">What&#39;s in this release, ranked by value?</text><rect x="809" y="152" width="719" height="110" rx="6" fill="#EAF1F8" stroke="#D9E2EC" stroke-width="1"></rect><rect x="809" y="152" width="7" height="110" rx="0" fill="#1B4C84"></rect><text x="840" y="185" fill="#2E6BB0" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;">02</text><text x="840" y="211" fill="#333333" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:21px;font-weight:700;letter-spacing:-0.2px;">Capacity &amp; velocity</text><text x="840" y="237" fill="#59595B" text-anchor="start" style="font-family:Inter, sans-serif;font-size:15px;font-weight:400;">How much can the team actually deliver per sprint?</text><rect x="72" y="277" width="719" height="110" rx="6" fill="#EAF1F8" stroke="#D9E2EC" stroke-width="1"></rect><rect x="72" y="277" width="7" height="110" rx="0" fill="#1B4C84"></rect><text x="103" y="310" fill="#2E6BB0" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;">03</text><text x="103" y="336" fill="#333333" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:21px;font-weight:700;letter-spacing:-0.2px;">Dependencies</text><text x="103" y="362" fill="#59595B" text-anchor="start" style="font-family:Inter, sans-serif;font-size:15px;font-weight:400;">What outside this team must land first?</text><rect x="809" y="277" width="719" height="110" rx="6" fill="#EAF1F8" stroke="#D9E2EC" stroke-width="1"></rect><rect x="809" y="277" width="7" height="110" rx="0" fill="#1B4C84"></rect><text x="840" y="310" fill="#2E6BB0" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;">04</text><text x="840" y="336" fill="#333333" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:21px;font-weight:700;letter-spacing:-0.2px;">Risk &amp; buffer</text><text x="840" y="362" fill="#59595B" text-anchor="start" style="font-family:Inter, sans-serif;font-size:15px;font-weight:400;">What could go wrong, and where&#39;s the slack?</text><rect x="72" y="402" width="719" height="110" rx="6" fill="#EAF1F8" stroke="#D9E2EC" stroke-width="1"></rect><rect x="72" y="402" width="7" height="110" rx="0" fill="#1B4C84"></rect><text x="103" y="435" fill="#2E6BB0" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;">05</text><text x="103" y="461" fill="#333333" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:21px;font-weight:700;letter-spacing:-0.2px;">Quality gate</text><text x="103" y="487" fill="#59595B" text-anchor="start" style="font-family:Inter, sans-serif;font-size:15px;font-weight:400;">What does &#34;releasable&#34; mean here?</text><rect x="809" y="402" width="719" height="110" rx="6" fill="#EAF1F8" stroke="#D9E2EC" stroke-width="1"></rect><rect x="809" y="402" width="7" height="110" rx="0" fill="#1B4C84"></rect><text x="840" y="435" fill="#2E6BB0" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;">06</text><text x="840" y="461" fill="#333333" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:21px;font-weight:700;letter-spacing:-0.2px;">Stakeholder alignment</text><text x="840" y="487" fill="#59595B" text-anchor="start" style="font-family:Inter, sans-serif;font-size:15px;font-weight:400;">Do business, delivery, and customers share one expectation?</text><rect x="72" y="534" width="1456" height="176" rx="6" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="1"></rect><rect x="72" y="534" width="1456" height="4" rx="0" fill="#C02638"></rect><circle cx="111" cy="565" r="14" fill="#C02638"></circle><text x="111" y="571" fill="#fff" text-anchor="middle" style="font-family:Montserrat, sans-serif;font-size:20px;font-weight:700;">+</text><text x="134" y="571" style="font-family:Montserrat,sans-serif;font-size:18px;font-weight:700;" fill="#C02638">Shipping AI features? Add three — <tspan fill="#59595B">Agentic Development Lifecycle (ADLC)</tspan></text><rect x="98" y="592" width="458.6666666666667" height="98" rx="5" fill="#EAF1F8" stroke="#D9E2EC" stroke-width="1"></rect><text x="116" y="622" fill="#1B4C84" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:15.5px;font-weight:700;">Evaluation gate</text><text x="116" y="644" fill="#59595B" text-anchor="start" style="font-family:Inter, sans-serif;font-size:13.5px;font-weight:400;">Define &#34;good enough&#34; and red-team before</text><text x="116" y="663" fill="#59595B" text-anchor="start" style="font-family:Inter, sans-serif;font-size:13.5px;font-weight:400;">release</text><rect x="570.6666666666667" y="592" width="458.6666666666667" height="98" rx="5" fill="#EAF1F8" stroke="#D9E2EC" stroke-width="1"></rect><text x="588.6666666666667" y="622" fill="#1B4C84" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:15.5px;font-weight:700;">Token-cost forecast</text><text x="588.6666666666667" y="644" fill="#59595B" text-anchor="start" style="font-family:Inter, sans-serif;font-size:13.5px;font-weight:400;">Model cost per use, in the plan</text><rect x="1043.3333333333335" y="592" width="458.6666666666667" height="98" rx="5" fill="#EAF1F8" stroke="#D9E2EC" stroke-width="1"></rect><text x="1061.3333333333335" y="622" fill="#1B4C84" text-anchor="start" style="font-family:Montserrat, sans-serif;font-size:15.5px;font-weight:700;">Human-in-the-loop guardrails</text><text x="1061.3333333333335" y="644" fill="#59595B" text-anchor="start" style="font-family:Inter, sans-serif;font-size:13.5px;font-weight:400;">Oversight and fallback by design</text></svg>